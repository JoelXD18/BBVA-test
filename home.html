<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBVA - Inicio</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  body {
    font-family:'Helvetica Neue', Arial, sans-serif;
    background:#f4f5f7;
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .screen {
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:#f4f5f7;
    display:flex;
    flex-direction:column;
  }

  /* Top bar */
  .topbar {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 20px 8px;
  }
  .topbar .item {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    font-size:11px;
    color:#0a2647;
    font-weight:600;
    text-decoration:none;
  }
  .topbar .item svg { width:22px; height:22px; stroke:#0a2647; }
  .topbar .title {
    font-size:17px;
    font-weight:700;
    color:#0a2647;
  }

  /* Tabs */
  .tabs {
    display:flex;
    gap:10px;
    padding:14px 20px 4px;
  }
  .tab {
    padding:10px 18px;
    border-radius:22px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
  }
  .tab.active { background:#0a2647; color:#fff; }
  .tab.inactive { background:transparent; color:#0a2647; }

  /* Section heading */
  .section-heading {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 20px 14px;
  }
  .section-heading h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size:24px;
    color:#0a2647;
    font-weight:700;
  }
  .section-heading svg { width:20px; height:20px; stroke:#0a2647; }

  /* Product card */
  .carousel {
    padding:0 20px;
  }
  .product-card {
    background:#fff;
    border-radius:16px;
    padding:22px 20px;
    box-shadow:0 2px 10px rgba(20,40,70,.06);
  }
  .product-top {
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .product-name {
    font-size:19px;
    font-weight:700;
    color:#0f6ab5;
  }
  .badge {
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    color:#5b6b7d;
    font-weight:600;
  }
  .badge .circle {
    width:24px; height:24px;
    border-radius:50%;
    background:#0a2647;
    display:flex; align-items:center; justify-content:center;
  }
  .badge svg { width:13px; height:13px; stroke:#fff; }

  .balance {
    margin-top:18px;
    font-size:26px;
    letter-spacing:3px;
    color:#0a2647;
    font-weight:600;
  }
  .balance-label {
    margin-top:4px;
    font-size:13px;
    color:#8b96a3;
  }

  .divider { height:1px; background:#eef0f3; margin:18px 0; }

  .line-item {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 4px;
    border-radius:12px;
  }
  .line-item + .line-item { margin-top:2px; }
  .line-left {
    display:flex;
    align-items:center;
    gap:12px;
  }
  .li-icon {
    width:38px; height:38px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .li-icon svg { width:18px; height:18px; }
  .li-icon.cine { background:#f4a340; }
  .li-icon.super { background:#3c4652; }
  .li-icon.compras { background:#1a73c9; }
  .line-label {
    font-size:15px;
    font-weight:600;
    color:#0f6ab5;
  }
  .line-amount {
    font-size:15px;
    letter-spacing:2px;
    color:#0a2647;
    font-weight:500;
  }

  .analysis-btn {
    display:block;
    width:100%;
    text-align:left;
    background:#f4f5f7;
    border:none;
    border-radius:12px;
    padding:14px 16px;
    margin-top:14px;
    font-size:14px;
    font-weight:700;
    color:#0f6ab5;
    cursor:pointer;
  }

  .pager {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 24px 10px;
  }
  .pager .count { font-size:13px; color:#8b96a3; }
  .pager .arrows { display:flex; gap:20px; }
  .pager svg { width:18px; height:18px; stroke:#8b96a3; }

  /* Bottom nav */
  .bottom-nav {
    margin-top:auto;
    display:flex;
    justify-content:space-around;
    align-items:center;
    padding:12px 8px 20px;
    background:#fff;
    border-top:1px solid #eef0f3;
  }
  .nav-item {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    font-size:11px;
    font-weight:600;
    color:#7c8794;
    text-decoration:none;
  }
  .nav-item.active { color:#0f6ab5; }
  .nav-item svg { width:22px; height:22px; }
</style>
</head>
<body>
<div class="screen">

  <div class="topbar">
    <a class="item" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
      Visible
    </a>
    <div class="title">Inicio</div>
    <div style="display:flex; gap:18px;">
      <a class="item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Blue
      </a>
      <a class="item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        Menú
      </a>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active">Destacado</div>
    <div class="tab inactive">Tus productos</div>
  </div>

  <div class="section-heading">
    <h1>Principales productos</h1>
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
  </div>

  <div class="carousel">
    <div class="product-card">
      <div class="product-top">
        <div class="product-name">Cuenta Principal</div>
        <div class="badge">
          <div class="circle">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          ·5678
        </div>
      </div>

      <div class="balance">•••• €</div>
      <div class="balance-label">Saldo disponible</div>

      <div class="divider"></div>

      <div class="line-item">
        <div class="line-left">
          <div class="li-icon cine">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="14" height="12" rx="2"/><path d="M17 9l4-3v12l-4-3"/></svg>
          </div>
          <div class="line-label">Entradas cine</div>
        </div>
        <div class="line-amount">•••• €</div>
      </div>

      <div class="line-item">
        <div class="line-left">
          <div class="li-icon super">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.6 3.4a2 2 0 0 0-2.8 0l-14 14V21h3.6l14-14a2 2 0 0 0 0-2.8z"/><path d="M15 6l3 3"/></svg>
          </div>
          <div class="line-label">Supermercado</div>
        </div>
        <div class="line-amount">•••• €</div>
      </div>

      <div class="line-item">
        <div class="line-left">
          <div class="li-icon compras">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2l1.5 4h9L18 2"/><path d="M3 6h18l-1.5 13a2 2 0 0 1-2 2H6.5a2 2 0 0 1-2-2L3 6z"/></svg>
          </div>
          <div class="line-label">Compras</div>
        </div>
        <div class="line-amount">•••• €</div>
      </div>

      <button class="analysis-btn">Ver análisis de gasto</button>
    </div>
  </div>

  <div class="pager">
    <div class="count">1 de 6</div>
    <div class="arrows">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a2647" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>

  <div class="bottom-nav">
    <a class="nav-item active" href="home.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      Inicio
    </a>
    <a class="nav-item" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/><polyline points="8 12 10.5 14.5 15 9"/></svg>
      Salud fina...
    </a>
    <a class="nav-item" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Contratar
    </a>
    <a class="nav-item" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3 7 12 13 21 7"/></svg>
      Buzón
    </a>
    <a class="nav-item" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Gestor
    </a>
  </div>

</div>
</body>
</html>
