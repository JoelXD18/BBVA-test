<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBVA</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background:#eef0f3;
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .screen {
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:#fff;
    position:relative;
  }
  /* Hero */
  .hero {
    position:relative;
    padding:56px 24px 190px;
    background:
      linear-gradient(180deg, rgba(4,20,46,.55) 0%, rgba(4,20,46,.35) 40%, rgba(4,20,46,.75) 100%),
      radial-gradient(circle at 20% 15%, #3a5570 0%, transparent 45%),
      linear-gradient(160deg, #0c2340 0%, #123a5e 35%, #1c5678 60%, #0a2540 100%);
    color:#fff;
    overflow:hidden;
  }
  .hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(ellipse at 70% 80%, rgba(90,140,160,.35), transparent 60%),
      radial-gradient(ellipse at 10% 90%, rgba(20,60,90,.6), transparent 55%);
    pointer-events:none;
  }
  .topbar {
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:relative;
    z-index:2;
  }
  .logo {
    font-weight:700;
    font-size:22px;
    letter-spacing:.5px;
  }
  .menu-btn {
    width:38px; height:38px;
    border-radius:50%;
    background:#0e2a4d;
    display:flex; align-items:center; justify-content:center;
  }
  .menu-btn svg { width:18px; height:18px; }
  .greeting {
    position:relative;
    z-index:2;
    font-family: Georgia, 'Times New Roman', serif;
    font-weight:700;
    font-size:36px;
    margin-top:34px;
    color:#fff;
  }
  /* Card */
  .card {
    position:relative;
    z-index:3;
    background:#fff;
    margin:-160px 16px 0;
    border-radius:16px;
    padding:24px 20px 20px;
    box-shadow:0 12px 30px rgba(10,30,60,.18);
  }
  .login-btn {
    width:100%;
    padding:15px;
    background:#0a2647;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
  }
  .login-btn:hover { background:#0f3560; }
  .ask {
    margin-top:16px;
    font-size:14px;
    color:#3d4a5c;
  }
  .register {
    display:inline-block;
    margin-top:8px;
    font-weight:700;
    font-size:16px;
    color:#0a2647;
    text-decoration:none;
    padding:2px 4px;
    border:1.5px solid #aac7ea;
    border-radius:4px;
  }
  .quick-actions {
    display:flex;
    justify-content:space-between;
    margin-top:22px;
  }
  .quick-actions a {
    flex:1;
    text-align:center;
    text-decoration:none;
    color:#0a2647;
    font-size:12px;
    font-weight:600;
  }
  .quick-actions .icon-circle {
    width:52px; height:52px;
    border-radius:50%;
    background:#eef2f7;
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 8px;
  }
  .quick-actions .icon-circle svg { width:22px; height:22px; stroke:#0a2647; }

  /* Open account section */
  .section {
    padding:28px 20px 40px;
  }
  .section h2 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size:26px;
    color:#0a2647;
    margin-bottom:16px;
  }
  .promo-card {
    border-radius:14px;
    overflow:hidden;
    border:1px solid #e7eaee;
  }
  .promo-img {
    width:100%;
    height:220px;
    background:
      linear-gradient(0deg, rgba(20,20,25,.35), rgba(20,20,25,0) 55%),
      linear-gradient(135deg,#d9cdbf 0%, #c7b7a3 40%, #a98f74 100%);
    position:relative;
  }
  .promo-img::before,
  .promo-img::after {
    content:"";
    position:absolute;
    border-radius:8px;
  }
  .promo-caption {
    padding:16px;
    font-weight:700;
    font-size:16px;
    color:#0a2647;
  }
</style>
</head>
<body>
<div class="screen">

  <div class="hero">
    <div class="topbar">
      <div class="logo">BBVA</div>
      <div class="menu-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </div>
    </div>
    <div class="greeting">Buenas tardes</div>
  </div>

  <div class="card">
    <button class="login-btn" onclick="location.href='home.html'">Iniciar sesión</button>
    <div class="ask">¿Eres cliente y es tu primera vez en la app?</div>
    <a class="register" href="#">Regístrate</a>

    <div class="quick-actions">
      <a href="#">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>
        </div>
        Hazte cliente
      </a>
      <a href="#">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.3-7-11a7 7 0 0 1 14 0c0 4.7-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
        </div>
        Puntos de<br>atención
      </a>
      <a href="#">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.7a2 2 0 0 1-.4 2.1L8.1 9.6a16 16 0 0 0 6.3 6.3l1.1-1.2a2 2 0 0 1 2.1-.4c.9.3 1.8.5 2.7.6a2 2 0 0 1 1.7 2z"/></svg>
        </div>
        Contáctanos
      </a>
    </div>
  </div>

  <div class="section">
    <h2>Abre tu cuenta</h2>
    <div class="promo-card">
      <div class="promo-img"></div>
      <div class="promo-caption">Tu nueva cuenta BBVA te espera</div>
    </div>
  </div>

</div>
</body>
</html>
